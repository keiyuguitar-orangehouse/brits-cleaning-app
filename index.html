<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美容室 清掃チェックアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc; /* slate-50 */
            color: #334155; /* slate-700 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .custom-checkbox {
            width: 1.75rem;
            height: 1.75rem;
            accent-color: #0ea5e9; /* sky-500 */
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.7rem center;
            background-size: 1em;
        }

        .toast-show {
            opacity: 1 !important;
            transform: translate(-50%, 0) !important;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .drag-handle { cursor: grab; touch-action: none; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.3; background-color: #f1f5f9; }
    </style>
</head>
<body class="antialiased pb-6">

    <!-- 合言葉（PIN）入力モーダル -->
    <div id="pin-modal" class="hidden fixed inset-0 bg-slate-900/95 z-[100] flex flex-col justify-center items-center backdrop-blur-md">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-[90%] max-w-sm text-center">
            <div class="mb-4 flex justify-center">
                <div class="bg-sky-100 p-3 rounded-full text-sky-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">合言葉を入力</h2>
            <p class="text-sm text-slate-500 mb-6 font-medium">お店で決めた4桁の数字を入力してください。</p>
            <div class="flex flex-col gap-3">
                <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" class="w-full border-2 border-slate-200 bg-slate-50 rounded-2xl px-4 py-4 text-center text-3xl tracking-[0.5em] focus:outline-none focus:border-sky-500 focus:bg-white transition shadow-inner" placeholder="••••">
                <p id="pin-error" class="text-red-500 text-sm font-bold hidden bg-red-50 py-2 rounded-lg">合言葉が間違っています</p>
                <button id="pin-submit-btn" class="w-full bg-sky-500 text-white font-bold py-4 rounded-2xl hover:bg-sky-600 transition active:scale-95 mt-4 shadow-md text-lg">アプリを開く</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-sm relative">
        
        <header class="bg-sky-500 text-white p-4 rounded-b-2xl shadow-md sticky top-0 z-10">
            <div class="flex justify-between items-center mb-2 px-1">
                <h1 class="text-lg font-bold tracking-wider">清掃チェックシート</h1>
                <div class="flex items-center gap-2">
                    <div id="sync-status" class="flex items-center gap-1.5 text-xs bg-sky-600 px-2.5 py-1 rounded-full border border-sky-400">
                        <span class="w-2 h-2 rounded-full bg-slate-300 shadow-[0_0_5px_#cbd5e1]" id="sync-dot"></span>
                        <span class="font-medium tracking-wide" id="sync-text">待機中</span>
                    </div>
                    <button id="settings-open-btn" class="p-1.5 hover:bg-sky-400 rounded-full transition active:scale-95" aria-label="設定">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between mt-3 px-1">
                <button id="prev-day-btn" class="p-2 hover:bg-sky-400 rounded-full transition active:scale-95" aria-label="前日">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                
                <div class="relative flex items-center justify-center gap-2 bg-sky-600/60 hover:bg-sky-600 py-2.5 px-6 rounded-full transition cursor-pointer shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <span id="date-display-text" class="font-bold tracking-widest text-sm"></span>
                    <input type="date" id="date-picker" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                </div>

                <button id="next-day-btn" class="p-2 hover:bg-sky-400 rounded-full transition active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed" aria-label="翌日">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </header>

        <main class="p-4">
            <div id="loading-overlay" class="absolute inset-0 bg-white/80 z-20 flex flex-col items-center justify-center pt-32 transition-opacity">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-sky-100 border-t-sky-500 mb-3"></div>
                <p class="text-sky-600 font-medium text-sm">クラウドと同期中...</p>
            </div>

            <div class="mb-6">
                <h2 class="text-sm font-semibold text-slate-500 mb-2 pl-1">店舗を選択</h2>
                <div id="shop-tabs" class="grid grid-cols-2 gap-2">
                    <!-- JSで動的に生成されます -->
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 p-3 border-b border-slate-100 flex justify-between items-center">
                    <h2 id="current-shop-name" class="font-bold text-slate-700">店舗名</h2>
                    <div class="flex items-center gap-3">
                        <span id="completion-status" class="text-xs font-bold px-2 py-1 bg-slate-200 text-slate-500 rounded-full transition-colors duration-300">0/0</span>
                    </div>
                </div>
                <ul id="task-list" class="divide-y divide-slate-100">
                    <!-- JSで動的に生成されます -->
                </ul>
            </div>
        </main>

        <div id="toast" class="fixed bottom-8 left-1/2 bg-slate-800/95 text-white px-5 py-2.5 rounded-full shadow-lg font-medium text-sm z-50 transform -translate-x-1/2 translate-y-4 opacity-0 transition-all duration-300 flex items-center gap-2 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <span id="toast-text">保存しました</span>
        </div>

        <!-- 設定モーダル -->
        <div id="settings-modal" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex flex-col justify-end sm:justify-center items-center backdrop-blur-sm transition-opacity">
            <div class="bg-white w-full sm:w-[90%] sm:max-w-md h-[85vh] sm:h-auto sm:max-h-[85vh] rounded-t-2xl sm:rounded-2xl flex flex-col shadow-2xl animate-[slideUp_0.3s_ease-out]">
                <div class="flex justify-between items-center p-4 border-b border-slate-100">
                    <h2 class="text-lg font-bold text-slate-800">マスターデータ管理</h2>
                    <button id="settings-close-btn" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-full transition active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="px-4 py-3 bg-slate-50 border-b border-slate-100">
                    <label class="text-sm font-bold text-slate-700 block mb-2 flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        編集対象の店舗
                    </label>
                    <select id="settings-target-select" class="w-full bg-white border border-slate-300 text-slate-700 py-2 pl-3 pr-8 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500">
                        <option value="ALL">全店舗一括で編集</option>
                        <option value="sunhair">sun hair BRITS のみ</option>
                        <option value="brothers">BRITS BROTHERS のみ</option>
                        <option value="tile">THE TILE のみ</option>
                        <option value="hanare">ブリッツ ハナレ のみ</option>
                    </select>
                    <p id="settings-target-warning" class="text-xs text-sky-600 mt-1.5 font-medium">※追加・削除した内容がすべての店舗に適用されます。</p>
                </div>

                <div class="p-4 overflow-y-auto flex-1 space-y-6 pb-10">
                    <!-- タスク管理 -->
                    <div>
                        <h3 class="font-bold text-slate-700 mb-3 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            項目の管理
                        </h3>
                        <div class="flex gap-2 mb-3">
                            <input type="text" id="new-task-input" placeholder="新しい項目名" class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 shadow-sm">
                            <button id="add-task-btn" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition active:scale-95 shadow-sm whitespace-nowrap">追加</button>
                        </div>
                        <ul id="settings-task-list" class="bg-slate-50 border border-slate-200 rounded-lg divide-y divide-slate-200">
                            <!-- JSで生成 -->
                        </ul>
                    </div>

                    <!-- スタッフ管理 -->
                    <div>
                        <h3 class="font-bold text-slate-700 mb-3 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            スタッフの管理
                        </h3>
                        <div class="flex gap-2 mb-3">
                            <input type="text" id="new-staff-input" placeholder="新しいスタッフ名" class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 shadow-sm">
                            <button id="add-staff-btn" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition active:scale-95 shadow-sm whitespace-nowrap">追加</button>
                        </div>
                        <div id="settings-staff-list" class="flex flex-wrap gap-2">
                            <!-- JSで生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <style>
            @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        </style>
    </div>

    <!-- Firebase リアルタイム同期ロジック -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- お店の合言葉設定 ---
        const SHOP_PIN = "3105"; // ★合言葉「3105」

        // --- 初期設定とデータ構造 ---
        const shops = [
            { id: 'sunhair', name: 'sun hair BRITS' },
            { id: 'brothers', name: 'BRITS BROTHERS' },
            { id: 'tile', name: 'THE TILE' },
            { id: 'hanare', name: 'ブリッツ ハナレ' }
        ];

        const defaultTasks = [
            { id: 'floor', name: 'フロア' }, { id: 'toilet', name: 'トイレ' },
            { id: 'shampoo', name: 'シャンプー台' }, { id: 'mirror', name: '鏡・セット面' },
            { id: 'washing', name: '洗い場' }, { id: 'colorbooth', name: 'カラーブース' }, 
            { id: 'vacuum', name: '掃除機' }, { id: 'roller', name: 'クッションコロコロ' } 
        ];

        const defaultStaffList = [
            'しなる', 'さとこ', 'なっこ', 'ちひろ', 'じっぽ', 'こうや', 'あいか', 'にこ', 'あず', 'みう', 'ひなの', 'かざと' 
        ];

        let masterData = {}; 
        let settingsTarget = 'ALL'; 
        let currentShopId = shops[0].id;
        let currentDateStr = ''; 
        let currentSystemDate = ''; 
        let cleaningData = {}; 
        let toastTimeout = null;

        // Firebase 関連変数
        let app, auth, db, appId, currentUser;
        let unsubscribeCleaning = null;
        let unsubscribeMaster = null;
        let isOnline = false;

        // --- 合言葉（PIN）認証ロジック ---
        function checkPin() {
            const input = document.getElementById('pin-input').value;
            if (input === SHOP_PIN) {
                localStorage.setItem('brits_app_pin', input);
                unlockApp();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('pin-input').value = '';
            }
        }

        function unlockApp() {
            document.getElementById('pin-modal').classList.add('hidden');
            document.getElementById('pin-error').classList.add('hidden');
            initFirebase();
            changeDate(currentSystemDate);
        }

        document.getElementById('pin-submit-btn').addEventListener('click', checkPin);
        document.getElementById('pin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPin();
        });


        // --- Firebase 初期化フロー ---
        async function initFirebase() {
            try {
                // 正しい Firebase Config
                const firebaseConfig = {
                  apiKey: "AIzaSyAONDcF143PbQ1Y8AKJe21Q7yh5XaXFKWI",
                  authDomain: "brits-cleaning.firebaseapp.com",
                  projectId: "brits-cleaning",
                  storageBucket: "brits-cleaning.firebasestorage.app",
                  messagingSenderId: "206432335314",
                  appId: "1:206432335314:web:6a5ae369d1170997c4c40b",
                  measurementId: "G-HT5XT0D8YG"
                };

                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = 'brits-cleaning';
                isOnline = true;
                
                // 本番用の匿名認証
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if(user) {
                        listenMasterData(); 
                        listenCleaningData(currentDateStr);
                        updateSyncUI(true);
                    }
                });
            } catch(error) {
                console.warn("ローカルモードで起動します:", error);
                isOnline = false;
                updateSyncUI(false);
                loadLocalMasterDataFallback();
                loadLocalDataFallback(currentDateStr);
            }
        }

        function updateSyncUI(online) {
            const dot = document.getElementById('sync-dot');
            const text = document.getElementById('sync-text');
            if(online) {
                dot.className = "w-2 h-2 rounded-full bg-green-300 animate-pulse shadow-[0_0_5px_#86efac]";
                text.textContent = "クラウド同期中";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-orange-400 shadow-[0_0_5px_#fb923c]";
                text.textContent = "端末内保存 (オフライン)";
            }
        }

        function listenMasterData() {
            if(!currentUser || !db) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'master', 'settings');
            
            unsubscribeMaster = onSnapshot(docRef, (docSnap) => {
                if(docSnap.exists()) {
                    masterData = docSnap.data().data;
                } else {
                    masterData = createDefaultMasterData();
                    saveMasterData(); 
                }
                renderSettingsIfOpen();
                renderTabs();
                renderTasks();
            }, (err) => console.error(err));
        }

        function listenCleaningData(dateStr) {
            if(!currentUser || !db) return;
            if(unsubscribeCleaning) unsubscribeCleaning();

            document.getElementById('loading-overlay').classList.remove('hidden');
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'cleaning', dateStr);

            unsubscribeCleaning = onSnapshot(docRef, (docSnap) => {
                if(docSnap.exists()) {
                    cleaningData = docSnap.data().data;
                } else {
                    cleaningData = createEmptyData();
                }
                document.getElementById('loading-overlay').classList.add('hidden');
                renderTabs();
                renderTasks();
            }, (err) => {
                console.error(err);
                document.getElementById('loading-overlay').classList.add('hidden');
            });
        }

        function saveMasterData() {
            if (isOnline && db && currentUser) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'master', 'settings');
                setDoc(docRef, { data: masterData }, { merge: true });
            } else {
                localStorage.setItem('brits_master_data_v2', JSON.stringify(masterData));
            }
        }

        function updateTaskToDB(shopId, taskId, isChecked, staffName) {
            if (!cleaningData[shopId]) return;
            cleaningData[shopId][taskId] = { isChecked, staffName };

            if (isOnline && db && currentUser) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'cleaning', currentDateStr);
                setDoc(docRef, { data: cleaningData }, { merge: true });
            } else {
                localStorage.setItem(`brits_cleaning_${currentDateStr}`, JSON.stringify(cleaningData));
            }
            
            showToast("同期完了");
            renderTabs(); 
        }

        function createDefaultMasterData() {
            let data = {};
            shops.forEach(shop => {
                data[shop.id] = {
                    tasks: JSON.parse(JSON.stringify(defaultTasks)),
                    staffs: [...defaultStaffList]
                };
            });
            return data;
        }

        function createEmptyData() {
            const data = {};
            shops.forEach(shop => {
                data[shop.id] = {};
                if(masterData[shop.id] && masterData[shop.id].tasks) {
                    masterData[shop.id].tasks.forEach(task => {
                        data[shop.id][task.id] = { isChecked: false, staffName: '' };
                    });
                }
            });
            return data;
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('shop-tabs');
            tabsContainer.innerHTML = ''; 
            if (!masterData[shops[0].id]) return;

            shops.forEach(shop => {
                const isActive = shop.id === currentShopId;
                
                let completed = 0;
                const shopTasks = masterData[shop.id].tasks;
                shopTasks.forEach(task => {
                    if (cleaningData[shop.id] && cleaningData[shop.id][task.id]?.isChecked) completed++;
                });
                const allCompleted = (completed === shopTasks.length && shopTasks.length > 0);
                
                const button = document.createElement('button');
                const baseClasses = "py-3 px-2 text-sm font-bold rounded-lg border transition duration-300 active:scale-95 flex justify-center items-center gap-1.5";
                let colorClasses = isActive 
                    ? (allCompleted ? "bg-green-500 text-white border-green-600 shadow-md" : "bg-sky-50 text-sky-600 border-sky-300 shadow-sm")
                    : (allCompleted ? "bg-green-50 text-green-600 border-green-200 hover:bg-green-100" : "bg-white text-slate-500 border-slate-200 hover:bg-slate-50");

                button.className = `${baseClasses} ${colorClasses}`;
                if (allCompleted) {
                    button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> <span>${shop.name}</span>`;
                } else {
                    button.textContent = shop.name;
                }

                button.onclick = () => { currentShopId = shop.id; renderTabs(); renderTasks(); };
                tabsContainer.appendChild(button);
            });
        }

        function renderTasks() {
            const currentShop = shops.find(s => s.id === currentShopId);
            document.getElementById('current-shop-name').textContent = currentShop.name;
            const taskListContainer = document.getElementById('task-list');
            taskListContainer.innerHTML = ''; 

            if (!cleaningData[currentShopId] || !masterData[currentShopId]) return;

            const currentShopData = cleaningData[currentShopId];
            const shopTasks = masterData[currentShopId].tasks;
            const shopStaffs = masterData[currentShopId].staffs;

            shopTasks.forEach(task => {
                if (!currentShopData[task.id]) currentShopData[task.id] = { isChecked: false, staffName: '' };
                const taskData = currentShopData[task.id];

                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-4 hover:bg-slate-50 transition bg-white ${taskData.isChecked ? 'bg-sky-50/60' : ''}`;
                li.dataset.taskId = task.id; 

                const leftDiv = document.createElement('div');
                leftDiv.className = "flex items-center gap-3 flex-1"; 
                leftDiv.innerHTML = `
                    <div class="drag-handle p-1 text-slate-300 hover:text-slate-500 transition -ml-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1.5"></circle><circle cx="9" cy="5" r="1.5"></circle><circle cx="9" cy="19" r="1.5"></circle><circle cx="15" cy="12" r="1.5"></circle><circle cx="15" cy="5" r="1.5"></circle><circle cx="15" cy="19" r="1.5"></circle></svg>
                    </div>
                    <input type="checkbox" class="custom-checkbox rounded text-sky-500 focus:ring-sky-500 pointer-events-none" ${taskData.isChecked ? 'checked' : ''}>
                    <span class="text-base font-medium select-none ${taskData.isChecked ? 'text-slate-800' : 'text-slate-600'}">${task.name}</span>
                `;

                const selectContainer = document.createElement('div');
                const select = document.createElement('select');
                select.className = "block w-28 bg-white border border-slate-300 text-slate-700 py-2 pl-3 pr-8 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500";
                
                select.innerHTML = `<option value="" ${taskData.staffName === "" ? 'selected' : ''} disabled>未完了</option>`;
                shopStaffs.forEach(staff => {
                    select.innerHTML += `<option value="${staff}" ${taskData.staffName === staff ? 'selected' : ''}>${staff}</option>`;
                });

                select.onchange = (e) => {
                    let newStaffName = e.target.value;
                    let newIsChecked = (newStaffName !== ""); 
                    updateTaskToDB(currentShopId, task.id, newIsChecked, newStaffName);
                };

                selectContainer.appendChild(select);
                li.appendChild(leftDiv);
                li.appendChild(selectContainer);
                taskListContainer.appendChild(li);
            });

            initSortable(taskListContainer);
            updateStatusBadge(shopTasks.length); 
        }

        function initSortable(container) {
            if (window.taskSortable) window.taskSortable.destroy();
            window.taskSortable = new Sortable(container, {
                handle: '.drag-handle',
                animation: 200,
                ghostClass: 'sortable-ghost',
                onEnd: function () {
                    const newOrderIds = Array.from(container.children).map(li => li.dataset.taskId);
                    masterData[currentShopId].tasks = newOrderIds.map(id => masterData[currentShopId].tasks.find(t => t.id === id));
                    saveMasterData(); 
                    showToast("順番を保存しました");
                }
            });
        }

        function updateStatusBadge(totalTasks) {
            let completedCount = 0;
            masterData[currentShopId].tasks.forEach(task => {
                if(cleaningData[currentShopId] && cleaningData[currentShopId][task.id]?.isChecked) completedCount++;
            });
            const statusBadge = document.getElementById('completion-status');
            statusBadge.textContent = `${completedCount}/${totalTasks}`;
            
            if(completedCount === totalTasks && totalTasks > 0) {
                statusBadge.classList.replace('bg-slate-200', 'bg-green-100');
                statusBadge.classList.replace('text-slate-500', 'text-green-700');
            } else {
                statusBadge.classList.remove('bg-green-100', 'text-green-700', 'bg-slate-200', 'text-slate-500');
                statusBadge.classList.add('bg-slate-200', 'text-slate-500');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            toast.classList.add('toast-show');
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('toast-show'), 2000); 
        }

        function renderSettingsIfOpen() {
            if(!document.getElementById('settings-modal').classList.contains('hidden')) {
                renderSettings();
            }
        }

        function renderSettings() {
            const displayShopId = settingsTarget === 'ALL' ? currentShopId : settingsTarget;
            const targetData = masterData[displayShopId];
            if(!targetData) return;

            const taskList = document.getElementById('settings-task-list');
            taskList.innerHTML = '';
            targetData.tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center px-4 py-2.5";
                li.innerHTML = `
                    <span class="text-sm font-medium text-slate-700">${task.name}</span>
                    <button class="text-slate-400 hover:text-red-500 p-1.5 rounded transition active:scale-95 btn-remove-task" data-id="${task.id}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                `;
                taskList.appendChild(li);
            });

            document.querySelectorAll('.btn-remove-task').forEach(btn => {
                btn.addEventListener('click', (e) => removeTask(e.currentTarget.dataset.id));
            });

            const staffListEl = document.getElementById('settings-staff-list');
            staffListEl.innerHTML = '';
            targetData.staffs.forEach(staff => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-1.5 bg-slate-100 border border-slate-200 pl-3 pr-1 py-1 rounded-full text-sm font-medium text-slate-700 shadow-sm";
                div.innerHTML = `
                    <span>${staff}</span>
                    <button class="text-slate-400 hover:text-red-500 hover:bg-red-50 transition rounded-full p-1 ml-1 btn-remove-staff" data-name="${staff}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                `;
                staffListEl.appendChild(div);
            });

            document.querySelectorAll('.btn-remove-staff').forEach(btn => {
                btn.addEventListener('click', (e) => removeStaff(e.currentTarget.dataset.name));
            });
        }

        function removeTask(taskId) {
            if(settingsTarget === 'ALL') {
                shops.forEach(shop => masterData[shop.id].tasks = masterData[shop.id].tasks.filter(t => t.id !== taskId));
            } else {
                masterData[settingsTarget].tasks = masterData[settingsTarget].tasks.filter(t => t.id !== taskId);
            }
            saveMasterData();
        }

        function removeStaff(staffName) {
            if(settingsTarget === 'ALL') {
                shops.forEach(shop => masterData[shop.id].staffs = masterData[shop.id].staffs.filter(s => s !== staffName));
            } else {
                masterData[settingsTarget].staffs = masterData[settingsTarget].staffs.filter(s => s !== staffName);
            }
            saveMasterData();
        }

        document.getElementById('settings-target-select').addEventListener('change', (e) => {
            settingsTarget = e.target.value;
            const warning = document.getElementById('settings-target-warning');
            if(settingsTarget === 'ALL') {
                warning.textContent = '※追加・削除した内容がすべての店舗に適用されます。';
                warning.className = 'text-xs text-sky-600 mt-1.5 font-medium';
            } else {
                const shopName = shops.find(s => s.id === settingsTarget)?.name || '';
                warning.textContent = `※「${shopName}」のみ編集されます。`;
                warning.className = 'text-xs text-orange-600 mt-1.5 font-medium';
            }
            renderSettings();
        });

        document.getElementById('settings-open-btn').addEventListener('click', () => {
            settingsTarget = 'ALL';
            document.getElementById('settings-target-select').value = 'ALL';
            renderSettings();
            document.getElementById('settings-modal').classList.remove('hidden');
        });

        document.getElementById('settings-close-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.add('hidden');
        });

        document.getElementById('add-task-btn').addEventListener('click', () => {
            const input = document.getElementById('new-task-input');
            const name = input.value.trim();
            if(name) {
                const newTask = { id: 'task_' + Date.now(), name: name };
                if(settingsTarget === 'ALL') {
                    shops.forEach(shop => masterData[shop.id].tasks.push({...newTask}));
                } else {
                    masterData[settingsTarget].tasks.push(newTask);
                }
                saveMasterData(); input.value = '';
            }
        });

        document.getElementById('add-staff-btn').addEventListener('click', () => {
            const input = document.getElementById('new-staff-input');
            const name = input.value.trim();
            if(name) {
                if(settingsTarget === 'ALL') {
                    shops.forEach(shop => {
                        if(!masterData[shop.id].staffs.includes(name)) masterData[shop.id].staffs.push(name);
                    });
                } else {
                    if(!masterData[settingsTarget].staffs.includes(name)) masterData[settingsTarget].staffs.push(name);
                }
                saveMasterData(); input.value = '';
            }
        });

        function getTodayString() {
            const date = new Date();
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }
        
        function changeDate(newDateStr) {
            currentDateStr = newDateStr;
            const date = new Date(newDateStr); 
            const w = ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
            let display = `${date.getMonth() + 1}月${date.getDate()}日 (${w})`;
            if (currentDateStr === currentSystemDate) display = "本日 " + display;
            
            document.getElementById('date-display-text').textContent = display;
            document.getElementById('date-picker').value = currentDateStr;
            document.getElementById('next-day-btn').disabled = (currentDateStr >= currentSystemDate);

            if(isOnline) {
                listenCleaningData(currentDateStr);
            } else {
                loadLocalDataFallback(currentDateStr);
            }
        }

        document.getElementById('date-picker').addEventListener('change', (e) => changeDate(e.target.value));
        document.getElementById('prev-day-btn').addEventListener('click', () => {
            const date = new Date(currentDateStr); date.setDate(date.getDate() - 1);
            changeDate(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`);
        });
        document.getElementById('next-day-btn').addEventListener('click', () => {
            const date = new Date(currentDateStr); date.setDate(date.getDate() + 1);
            const newDateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            if(newDateStr <= currentSystemDate) changeDate(newDateStr);
        });

        function loadLocalMasterDataFallback() {
            const saved = localStorage.getItem('brits_master_data_v2');
            masterData = saved ? JSON.parse(saved) : createDefaultMasterData();
            renderTabs(); renderTasks();
        }
        function loadLocalDataFallback(dateStr) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            setTimeout(() => {
                const saved = localStorage.getItem(`brits_cleaning_${dateStr}`);
                cleaningData = saved ? JSON.parse(saved) : createEmptyData();
                document.getElementById('loading-overlay').classList.add('hidden');
                renderTabs(); renderTasks();
            }, 100);
        }

        window.addEventListener('DOMContentLoaded', () => {
            currentSystemDate = getTodayString();
            currentDateStr = currentSystemDate;
            document.getElementById('date-picker').max = currentSystemDate;

            const savedPin = localStorage.getItem('brits_app_pin');
            if (savedPin === SHOP_PIN) {
                unlockApp();
            } else {
                document.getElementById('pin-modal').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
